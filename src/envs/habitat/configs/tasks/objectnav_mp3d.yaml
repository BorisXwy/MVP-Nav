# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: objectnav
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/dataset/objectnav: mp3d
  - _self_

habitat:
  environment:
    max_episode_steps: 500
  simulator:
    forward_step_size: 0.25
    turn_angle: 10
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 0.88, 0]
          depth_sensor:
            width: 640
            height: 480
            hfov: 79
            min_depth: 0.5
            max_depth: 5.0
            position: [0, 0.88, 0]
        height: 0.88
        radius: 0.18
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: false
  dataset:
    split: val
    data_path: /mnt/pool1/sharehome/xiewenyuan/sharedata/datasets/objectnav/mp3d/v1/{split}/{split}.json.gz
    scenes_dir: data/scene_datasets/mp3d

