# @package _global_

defaults:

  - /habitat: habitat_config_base
  - /habitat/task: instance_imagenav
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgbds_agent
  - /habitat/dataset/instance_imagenav: mp3d_v1
  - _self_


habitat:

  environment:
    max_episode_seconds: 1000
  simulator:
    forward_step_size: 0.25 # 设置前进距离，单位：米
    turn_angle: 10
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 1.31, 0]
          # depth_sensor:
          #   width: 640
          #   height: 480
          #   hfov: 79
          #   min_depth: 0.5
          #   max_depth: 10.0
          #   position: [0, 1.31, 0]
          # semantic_sensor:
          #   width: 640
          #   height: 480
          #   hfov: 79
          #   position: [0, 1.31, 0]
        height: 1.31
        radius: 0.10
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True
  dataset:
    split: train

